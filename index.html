<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Documentation</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #202124;
      background: #f7f8fa;
    }

    body {
      margin: 0;
    }

    main {
      box-sizing: border-box;
      width: min(880px, 100%);
      margin: 0 auto;
      padding: 48px 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.2;
      font-weight: 700;
    }

    p {
      margin: 0 0 28px;
      max-width: 620px;
      color: #5f6368;
      line-height: 1.5;
    }

    .docs-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .doc-link {
      display: block;
      padding: 18px 20px;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      background: #fff;
      color: inherit;
      text-decoration: none;
    }

    .doc-link:hover,
    .doc-link:focus {
      border-color: #0969da;
      outline: none;
    }

    .doc-title {
      display: block;
      margin-bottom: 6px;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .doc-description {
      color: #5f6368;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <h1>API Documentation</h1>
    <p>Swagger documentation for project APIs.</p>

    <ul class="docs-list">
      <li>
        <a class="doc-link" href="./peril_score/">
          <span class="doc-title">Peril Score API</span>
          <span class="doc-description">Lookup endpoint documentation for portal dropdown values.</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
